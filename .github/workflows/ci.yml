name: CI Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code using a community action
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Run a shell command
      - name: List files in repo
        run: ls -l
